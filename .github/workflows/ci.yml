name: Java CI Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    # Kích hoạt Matrix Strategy để chạy đồng thời trên 3 hệ điều hành
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    # Máy ảo sẽ thay đổi linh hoạt theo từng luồng trong ma trận
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Test with Maven
        run: mvn clean package

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          # Tách biệt tên file jar thành phẩm theo từng hệ điều hành để tránh ghi đè
          name: order-service-${{ matrix.os }}
          path: target/*.jar