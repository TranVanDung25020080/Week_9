name: Java CI Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout source code # bai 10
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify with JaCoCo
        run: mvn clean verify
        env:
          DATABASE_SECRET_KEY: ${{ secrets.APP_DB_CONN }}

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }}
          path: target/site/jacoco/

      - name: Automate Continuous Delivery (GitHub Release)
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Production Release Build v1.0.${{ github.run_number }}
          body: |
            🎉 Hệ thống CD tự động phát hành phiên bản mới!
            - Trạng thái: Build & Kiểm thử thành công trên 3 Hệ điều hành.
            - Độ bao phủ mã nguồn (JaCoCo): Đạt chuẩn > 80%.
            - Mã định danh tự động: #${{ github.run_number }}
          files: target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}