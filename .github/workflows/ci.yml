name: Java CI Automation

# Kích hoạt pipeline khi có hành động push hoặc tạo pull request vào nhánh chính
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Chạy trên hệ điều hành Ubuntu ảo của GitHub

    steps:
      # Bước 1: Lấy mã nguồn từ GitHub về máy ảo
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Bước 3: Thực thi vòng đời build của Maven
      - name: Build and Test with Maven
        run: mvn clean package

      # Bước 4: Lưu giữ tệp .jar được tạo ra sau khi build hoàn tất
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-service-product
          path: target/*.jar
          # Tìm tất cả các file jar trong thư mục target để lưu trữ