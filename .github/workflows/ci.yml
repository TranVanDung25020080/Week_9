name: Java CI Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

    # SỬA ĐỔI: Chuyển sang lệnh mvn clean verify để kích hoạt kiểm tra JaCoCo
      - name: Build and Verify with JaCoCo
        run: mvn clean verify

      # BỔ SUNG: Trích xuất và lưu trữ báo cáo độ bao phủ mã nguồn
      - name: Upload JaCoCo Coverage Report
        if: always() # Luôn chạy bước này kể cả khi build thành công hay thất bại để lấy báo cáo lỗi
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }}
          path: target/site/jacoco/